<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Orbitale Alpha | Simulateur Global</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4ff;
            --mars: #ff5722;
            --danger: #ff4444;
            --glass: rgba(5, 10, 25, 0.9);
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Share Tech Mono', monospace; color: white; }
        canvas { display: block; cursor: crosshair; }
        
        /* --- UI TACTIQUE --- */
        .overlay {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: var(--glass); padding: 20px;
            border-radius: 15px; width: 300px;
            backdrop-filter: blur(15px); border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .hud-header { font-size: 1.2rem; border-bottom: 1px solid var(--primary); margin-bottom: 15px; padding-bottom: 5px; color: var(--primary); }
        
        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.8rem; }
        .bar-container { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        #pollution-bar { height: 100%; width: 0%; background: var(--primary); transition: 0.3s; }

        .counter-box {
            background: rgba(0,0,0,0.3); border: 1px dashed var(--primary);
            padding: 10px; border-radius: 8px; text-align: center; margin: 15px 0;
        }
        #click-count { font-size: 2rem; font-weight: bold; color: var(--primary); }

        /* --- BOUTONS --- */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button {
            background: rgba(0, 212, 255, 0.1); border: 1px solid var(--primary);
            color: var(--primary); padding: 10px; border-radius: 5px;
            cursor: pointer; font-family: inherit; font-size: 0.8rem;
            transition: all 0.2s;
        }
        button:hover { background: var(--primary); color: #000; }
        .btn-exit { background: rgba(255, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); display: none; }
        .btn-exit:hover { background: var(--danger); color: #000; }

        #log { position: absolute; bottom: 20px; left: 20px; font-size: 0.7rem; color: var(--primary); background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="hud-header">SYSTEM CONTROL V4.0</div>
    
    <div class="stat-row">
        <span>NOM DE LA CIBLE:</span>
        <span id="target-name" style="color: var(--primary);">TERRA_01</span>
    </div>
    
    <div class="stat-row">
        <span>DÉGRADATION:</span>
        <span id="deg-percent">0%</span>
    </div>
    <div class="bar-container"><div id="pollution-bar"></div></div>

    <div class="counter-box">
        <div style="font-size: 0.6rem; opacity: 0.7;">IMPACTS COLLECTÉS</div>
        <div id="click-count">0</div>
    </div>

    <div class="controls">
        <button onclick="resetPlanet()">RÉINITIALISER LA PLANÈTE</button>
        <button onclick="exitSecretMode()" id="btn-exit" class="btn-exit">QUITTER MODE OFFENSIF</button>
    </div>
    
    <div style="font-size: 0.6rem; margin-top: 15px; opacity: 0.5; text-align: center;">
        RECO_VOCALE: Taper "magic" pour l'armement
    </div>
</div>

<div id="log">> STANDBY_MODE</div>

<script>
    let scene, camera, renderer, globe, clouds, stars, controls, raycaster, mouse;
    let count = 0, secretMode = false, isExploded = false;
    let planes = [], fragments = [];
    const loader = new THREE.TextureLoader();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Éclairage
        scene.add(new THREE.AmbientLight(0x404040, 1.5));
        const sun = new THREE.PointLight(0xffffff, 1.2, 100);
        sun.position.set(10, 10, 10);
        scene.add(sun);

        // --- GÉNÉRATION TERRE ---
        const geometry = new THREE.SphereGeometry(4, 64, 64);
        const material = new THREE.MeshPhongMaterial({
            map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
            color: 0xffffff,
            shininess: 10
        });
        globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Nuages
        clouds = new THREE.Mesh(
            new THREE.SphereGeometry(4.08, 64, 64),
            new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true, opacity: 0.5
            })
        );
        scene.add(clouds);

        // Etoiles
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<4000; i++) starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7}));
        scene.add(stars);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('click', onAction);
        
        // Code Secret "magic"
        let inputBuffer = "";
        window.addEventListener('keydown', (e) => {
            inputBuffer += e.key.toLowerCase();
            if (inputBuffer.slice(-5) === "magic") activateSecretMode();
        });
        
        animate();
    }

    // --- TRANSFORMATION TERRE VERS MARS ---
    function updatePlanetLogic() {
        let progress = Math.min(count / 1000000, 1);
        
        // Changement de couleur dynamique
        globe.material.color.setRGB(1, 1 - (progress * 0.75), 1 - (progress * 0.9));
        clouds.material.opacity = 0.5 * (1 - progress);
        
        // Mise à jour UI
        document.getElementById('pollution-bar').style.width = (progress * 100) + "%";
        document.getElementById('deg-percent').innerText = Math.round(progress * 100) + "%";
        
        if (progress > 0.5) {
            document.getElementById('target-name').innerText = "MARS_TRANSITION";
            document.getElementById('target-name').style.color = "var(--mars)";
            document.getElementById('pollution-bar').style.background = "var(--mars)";
        }
    }

    // --- MODE SECRET : AIRSTRIKE ---
    function activateSecretMode() {
        if(secretMode) return;
        secretMode = true;
        scene.remove(globe);
        scene.remove(clouds);
        
        createTower(-3.5);
        createTower(3.5);

        document.getElementById('hud-box').style.borderColor = "var(--danger)";
        document.getElementById('btn-exit').style.display = "block";
        document.getElementById('target-name').innerText = "OFFENSIVE_ZONE";
        document.getElementById('log').innerHTML = "> PROTOCOLE_AIRSTRIKE_ACTIF";
    }

    function createTower(x) {
        const segments = 12; 
        for(let i=0; i<segments; i++) {
            const piece = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 2),
                new THREE.MeshPhongMaterial({ color: 0x444444, shininess: 50 })
            );
            piece.position.set(x, (i * 1.1) - 5, 0);
            piece.userData = { 
                originalPos: piece.position.clone(), 
                velocity: new THREE.Vector3(),
                isFragment: true 
            };
            scene.add(piece);
            fragments.push(piece);
        }
    }

    function triggerExplosion() {
        if(isExploded) return;
        isExploded = true;
        
        fragments.forEach(f => {
            f.userData.velocity.set((Math.random()-0.5)*0.6, Math.random()*0.5, (Math.random()-0.5)*0.6);
        });

        document.getElementById('log').innerHTML = "> IMPACT_CONFIRMÉ : STRUCTURE_DÉTRUITE";
        
        setTimeout(() => {
            isExploded = false;
            fragments.forEach(f => {
                f.position.copy(f.userData.originalPos);
                f.rotation.set(0, 0, 0);
                f.userData.velocity.set(0, 0, 0);
            });
            document.getElementById('log').innerHTML = "> STRUCTURE_RECONSTRUITE";
        }, 4000);
    }

    // --- FONCTIONS DE RETOUR ---
    window.resetPlanet = function() {
        count = 0;
        document.getElementById('click-count').innerText = "0";
        document.getElementById('pollution-bar').style.width = "0%";
        document.getElementById('deg-percent').innerText = "0%";
        document.getElementById('target-name').innerText = "TERRA_01";
        document.getElementById('target-name').style.color = "var(--primary)";
        document.getElementById('pollution-bar').style.background = "var(--primary)";
        
        globe.material.color.setRGB(1, 1, 1);
        clouds.material.opacity = 0.5;
        document.getElementById('log').innerHTML = "> RÉINITIALISATION_TERMINÉE";
    }

    window.exitSecretMode = function() {
        secretMode = false;
        fragments.forEach(f => scene.remove(f));
        fragments = [];
        planes.forEach(p => scene.remove(p));
        planes = [];

        scene.add(globe);
        scene.add(clouds);
        
        document.getElementById('btn-exit').style.display = "none";
        document.getElementById('hud-box').style.borderColor = "var(--primary)";
        document.getElementById('target-name').innerText = "TERRA_01";
        document.getElementById('log').innerHTML = "> RETOUR_SUR_ORBITE";
    }

    function spawnPlane() {
        const p = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 4), new THREE.MeshPhongMaterial({color: 0xcccccc}));
        const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.5), new THREE.MeshPhongMaterial({color: 0x999999}));
        p.add(body, wing);
        p.position.set((Math.random()-0.5)*5, Math.random()*3, -30);
        scene.add(p);
        planes.push(p);
    }

    function onAction(e) {
        if (secretMode) {
            spawnPlane();
            count += 1;
        } else {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(globe).length > 0) {
                count++;
                updatePlanetLogic();
            }
        }
        document.getElementById('click-count').innerText = count;
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if (!secretMode) {
            globe.rotation.y += 0.002;
            clouds.rotation.y += 0.0025;
        } else {
            planes.forEach((p, i) => {
                p.position.z += 0.5;
                if(p.position.z >= -1 && p.position.z <= 1) triggerExplosion();
                if(p.position.z > 20) { scene.remove(p); planes.splice(i, 1); }
            });
            if(isExploded) {
                fragments.forEach(f => {
                    f.position.add(f.userData.velocity);
                    f.rotation.x += 0.07;
                    f.userData.velocity.y -= 0.012;
                });
            }
        }
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
<style></style>
<style>
    /* Voile de chargement / Transition spatiale */
    #space-loader {
        position: fixed;
        inset: 0;
        background: #04020f;
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 1s ease-out, visibility 1s;
    }

    .hyper-jump-line {
        position: absolute;
        background: linear-gradient(to right, transparent, var(--primary), white);
        height: 2px;
        width: 100px;
        opacity: 0;
        animation: launch 0.8s ease-in forwards;
    }

    @keyframes launch {
        0% { transform: scaleX(0.1) translateX(-200%); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: scaleX(5) translateX(500%); opacity: 0; }
    }

    /* Animation du texte d'accueil */
    .hero h1, .hero p, .btn-group {
        opacity: 0;
        transform: translateY(30px);
        transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .content-visible h1, 
    .content-visible p, 
    .content-visible .btn-group {
        opacity: 1;
        transform: translateY(0);
    }

    /* Décalage pour l'effet d'apparition fluide */
    .content-visible p { transition-delay: 0.3s; }
    .content-visible .btn-group { transition-delay: 0.6s; }
</style>

<div id="space-loader">
    <div id="stars-container"></div>
    <h2 id="loader-text" style="color: white; font-weight: 800; letter-spacing: 5px; z-index: 10001;">INITIALISATION...</h2>
</div>

<script>
    window.addEventListener('load', () => {
        const loader = document.getElementById('space-loader');
        const starsContainer = document.getElementById('stars-container');
        
        // Création de 20 lignes de "vitesse lumière" aléatoires
        for(let i=0; i<20; i++) {
            let line = document.createElement('div');
            line.className = 'hyper-jump-line';
            line.style.top = Math.random() * 100 + '%';
            line.style.left = '10%';
            line.style.animationDelay = (Math.random() * 0.5) + 's';
            starsContainer.appendChild(line);
        }

        // Séquence d'effacement du loader
        setTimeout(() => {
            document.getElementById('loader-text').innerText = "VITESSE LUMIÈRE";
            document.getElementById('loader-text').style.transform = "scale(1.5)";
            document.getElementById('loader-text').style.opacity = "0";
            document.getElementById('loader-text').style.transition = "1s";
        }, 1200);

        setTimeout(() => {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            // Déclenche l'apparition du contenu du site
            document.querySelector('.hero').classList.add('content-visible');
        }, 2000);
    });

    // Effet de parallaxe léger sur le titre au mouvement de la souris
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        const heroTitle = document.querySelector('h1');
        if(heroTitle) {
            heroTitle.style.transform = `translateX(${x}px) translateY(${y}px)`;
        }
    });
