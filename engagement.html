<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Orbitale | Collecteur d'Impact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #ff2f92;
            --glass: rgba(4, 2, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        canvas { display: block; cursor: crosshair; }
        
        /* Interface */
        .overlay {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: var(--glass); padding: 25px;
            border-radius: 24px; width: 320px;
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* COMPTEUR DE CLICS */
        .counter-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }
        #click-count { font-size: 2rem; font-weight: 800; color: var(--primary); display: block; }
        .counter-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-ui {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            font-size: 0.75rem;
        }
        .btn-ui:hover { background: var(--primary); color: #000; }

        #log { position: absolute; bottom: 20px; left: 20px; font-family: monospace; font-size: 0.7rem; color: var(--primary); }
        .back-btn { display: block; margin-top: 20px; text-align: center; color: var(--secondary); text-decoration: none; font-weight: 800; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="overlay">
    <h1 style="margin:0; font-size: 1.5rem;">Exploration Active</h1>
    <p style="font-size: 0.8rem; opacity: 0.6;">Cliquez n'importe où sur la Terre pour générer une impulsion d'énergie.</p>
    
    <div class="counter-box">
        <span class="counter-label">Impact Global</span>
        <span id="click-count">0</span>
    </div>

    <div class="location-grid">
        <button class="btn-ui" onclick="focusCity(48.8, 2.3, 'Paris')">🗼 Paris</button>
        <button class="btn-ui" onclick="focusCity(35.6, 139.6, 'Tokyo')">🏮 Tokyo</button>
    </div>

    <a href="index.html" class="back-btn">RETOUR AU QG</a>
</div>

<div id="log">SYSTEM_READY...</div>

<script>
    let scene, camera, renderer, globe, clouds, stars, controls, raycaster, mouse;
    let count = 0;
    const loader = new THREE.TextureLoader();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Lumières
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 3, 5);
        scene.add(sun);

        // Terre
        const earthGeo = new THREE.SphereGeometry(3, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
            shininess: 5
        });
        globe = new THREE.Mesh(earthGeo, earthMat);
        scene.add(globe);

        // Nuages
        clouds = new THREE.Mesh(
            new THREE.SphereGeometry(3.05, 64, 64),
            new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true, opacity: 0.4
            })
        );
        scene.add(clouds);

        // Étoiles
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<5000; i++) starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x888888, size: 0.5}));
        scene.add(stars);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // ÉCOUTEUR DE CLIC
        window.addEventListener('click', onEarthClick);
        
        animate();
    }

    function onEarthClick(event) {
        // Calcul de la position de la souris
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(globe);

        if (intersects.length > 0) {
            // 1. Incrémenter le compteur
            count++;
            document.getElementById('click-count').innerText = count;
            
            // 2. Feedback visuel (Onde/Point)
            const point = intersects[0].point;
            createPulse(point);

            // 3. Log
            document.getElementById('log').innerHTML = `ENERGY_COLLECTED: +1 (TOTAL: ${count})`;
            
            // Effet flash sur le compteur
            const cb = document.querySelector('.counter-box');
            cb.style.background = "rgba(0, 212, 255, 0.4)";
            setTimeout(() => cb.style.background = "rgba(0, 212, 255, 0.1)", 100);
        }
    }

    function createPulse(position) {
        const pulseGeo = new THREE.SphereGeometry(0.05, 16, 16);
        const pulseMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 1 });
        const pulse = new THREE.Mesh(pulseGeo, pulseMat);
        
        pulse.position.copy(position);
        scene.add(pulse);

        // Animation de l'onde
        let scale = 1;
        const interval = setInterval(() => {
            scale += 0.1;
            pulse.scale.set(scale, scale, scale);
            pulse.material.opacity -= 0.05;
            if (pulse.material.opacity <= 0) {
                clearInterval(interval);
                scene.remove(pulse);
            }
        }, 20);
    }

    window.focusCity = function(lat, lon, name) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const dist = 7;
        camera.position.x = dist * Math.sin(phi) * Math.cos(theta);
        camera.position.y = dist * Math.cos(phi);
        camera.position.z = dist * Math.sin(phi) * Math.sin(theta);
        controls.update();
        document.getElementById('log').innerHTML = `NAVIGATING_TO: ${name.toUpperCase()}`;
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.001;
        clouds.rotation.y += 0.0012;
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
